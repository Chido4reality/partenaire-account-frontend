apply plugin: 'com.android.application'

// MP-SIGNING-PROPS: resolve release-signing credentials from
// android/keystore.properties (gitignored) when present, falling back to the
// MP_KEYSTORE_PASSWORD / MP_KEY_PASSWORD env vars. This removes the dependency
// on pasted shell commands — Git Bash bracketed-paste artifacts (^[[200~) were
// corrupting the env-var exports, so passwords arrived null and
// :app:signReleaseBundle NPE'd at FinalizeBundleTask. Every value coalesces to
// "" so a null can never reach the signer (missing/empty → clear "keystore
// password was incorrect", not a NullPointerException).
def mpKsPropsFile = rootProject.file('keystore.properties')
def mpKsProps = new Properties()
if (mpKsPropsFile.exists()) {
    mpKsPropsFile.withInputStream { mpKsProps.load(it) }
}
def mpStoreFileName = (mpKsProps.getProperty('storeFile') ?: 'mp-release-key.jks').trim()
def mpStorePass     = (mpKsProps.getProperty('storePassword') ?: System.getenv('MP_KEYSTORE_PASSWORD') ?: '').trim()
def mpKeyAlias      = (mpKsProps.getProperty('keyAlias') ?: 'mp-release').trim()
def mpKeyPass       = (mpKsProps.getProperty('keyPassword') ?: System.getenv('MP_KEY_PASSWORD') ?: '').trim()

android {
    namespace "com.partenaire.monpartenaire"
    compileSdk rootProject.ext.compileSdkVersion
    // MP-16KB-DROP-SQLITE: the bundle now ships ZERO native libraries — the only
    // .so was the prebuilt (4 KB-aligned) libsqlcipher.so from
    // @capacitor-community/sqlite, which was removed (queue moved to IndexedDB).
    // With no .so at all, the 16 KB page-size requirement is met by construction.
    // NDK r27 is retained only so the toolchain stays 16 KB-ready if native code
    // is ever added again.
    ndkVersion "27.3.13750724"
    defaultConfig {
        applicationId "com.partenaire.monpartenaire"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        // MP-PLAY-CONSOLE-INITIAL-RELEASE: versionCode MUST monotonically
        // increase for every Play Console upload (the store rejects
        // duplicates). versionName is the human-facing semver visible
        // in About / Play Store. Bump versionCode by +1 every release;
        // bump versionName per semver rules.
        versionCode 71
        versionName "2.2.22"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    // MP-PLAY-CONSOLE-INITIAL-RELEASE: signing config for the signed
    // App Bundle (.aab). The keystore lives OUTSIDE the repo at
    // android/mp-release-key.jks (not committed; see .gitignore).
    // Credentials are resolved above (mp* vars) from android/keystore.properties
    // (preferred, gitignored) or the MP_* env vars as a fallback — never
    // hardcoded in source. storeFile resolves relative to the android/ root.
    signingConfigs {
        release {
            storeFile rootProject.file(mpStoreFileName)
            storePassword mpStorePass
            keyAlias mpKeyAlias
            keyPassword mpKeyPass
        }
    }
    buildTypes {
        release {
            // MP-R8-LEFT-OFF: minification/obfuscation stays DISABLED. Enabling R8
            // would clear the Play "no deobfuscation file" warning (informational,
            // no user impact) but risks stripping classes the Capacitor bridge and
            // the Bluetooth ESC/POS printer reach via reflection/JNI — and we can't
            // verify printing on a device here. Not worth risking the printer.
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
            // MP-NATIVE-DEBUG-SYMBOLS (Fix #2): request native debug symbols in the
            // AAB so Play can symbolicate native crashes. Since MP-16KB-DROP-SQLITE
            // the bundle ships NO native libs, so extraction is a no-op and the Play
            // "no debug symbols" note no longer applies. Config kept: correct + it
            // auto-activates if a symbol-carrying lib is ever added.
            ndk {
                debugSymbolLevel 'FULL'
            }
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
