         around the status/nav bars under Android 15+ edge-to-edge. Today (with
         windowOptOutEdgeToEdgeEnforcement) the insets resolve to 0 and the
         padding no-ops; it engages automatically if/when the opt-out is removed. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Mon Partenaire Dozie</title>

    <!-- PWA -->
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <meta name="theme-color" content="#1a1f2e" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Mon Partenaire Dozie" />
    <meta name="description" content="POS & gestion de stock pour commerçants" />
  </head>
